name: apexforge
description: ApexForge Life Mastery Tracker - Your personal life operating system.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3
  firebase_storage: ^12.3.2
  google_sign_in: ^6.2.1

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Local Storage (offline-first)
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Charts
  fl_chart: ^0.69.0

  # Animations
  lottie: ^3.1.2
  flutter_animate: ^4.5.0
  confetti: ^0.7.0

  # Notifications
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # Media
  image_picker: ^1.1.2
  record: ^5.1.2
  speech_to_text: ^7.0.0

  # Rich Text Editor
  flutter_quill: ^10.8.3

  # UI Components
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  table_calendar: ^3.1.2
  percent_indicator: ^4.2.3
  animated_text_kit: ^4.2.3

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.2
  path_provider: ^2.1.4
  share_plus: ^10.0.2
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.5
  shared_preferences: ^2.3.2
  pdf: ^3.11.1
  open_filex: ^4.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  hive_generator: ^2.0.1
  json_serializable: ^6.8.0
  mocktail: ^1.0.4
  fake_cloud_firestore: ^3.0.3

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
    - assets/icons/
    - assets/fonts/
  fonts:
    - family: Rajdhani
      fonts:
        - asset: assets/fonts/Rajdhani-Regular.ttf
        - asset: assets/fonts/Rajdhani-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Rajdhani-Bold.ttf
          weight: 700
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
